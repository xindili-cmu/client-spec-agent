name: Weekly Climate Intel Refresh

on:
  schedule:
    # Every Monday at 09:00 UTC (= 5am ET / 2am PT — adjust if needed)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # allow manual trigger from Actions tab

# Prevent two refresh runs from racing on the same main branch
concurrency:
  group: weekly-refresh
  cancel-in-progress: false  # finish current run before next; don't kill mid-CTVC

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow committing data.json + changelog
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run refresh script
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: node scripts/refresh.js

      - name: Commit updated data.json + changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Weekly refresh $(date -u +%Y-%m-%d)"
          # Retry push up to 3 times with rebase, handles race conditions
          # (e.g., if you push manually while this action is running)
          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            if git push; then
              echo "✓ Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed, fetching + rebasing onto latest main..."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase conflict — aborting and falling back to merge"
              git rebase --abort
              git pull --no-rebase origin main --no-edit || true
            fi
          done
          echo "✗ Push failed after 3 attempts. Manual intervention required."
          exit 1
